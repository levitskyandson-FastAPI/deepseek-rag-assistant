{% extends "base.html" %}
{% block content %}
<h1>{% if admin %}Редактирование администратора{% else %}Новый администратор{% endif %}</h1>
<form method="POST">
    <div class="mb-3">
        <label for="username" class="form-label">Логин *</label>
        <input type="text" class="form-control" id="username" name="username" required value="{{ admin.username if admin else '' }}">
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Пароль {% if admin %}(оставьте пустым, если не меняете){% endif %}</label>
        <input type="password" class="form-control" id="password" name="password">
    </div>
    <div class="mb-3">
        <label for="role" class="form-label">Роль</label>
        <select class="form-select" id="role" name="role">
            <option value="manager" {% if admin and admin.role == 'manager' %}selected{% endif %}>Менеджер</option>
            <option value="admin" {% if admin and admin.role == 'admin' %}selected{% endif %}>Админ</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{{ url_for('admins_list') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
